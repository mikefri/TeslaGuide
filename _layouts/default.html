<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Barlow+Condensed:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
</head>
<body>
  <nav class="navbar">
    <a href="{{ '/' | relative_url }}" class="nav-logo">TESLA<span>GUIDE</span></a>
    <div class="nav-links">
      <a href="{{ '/' | relative_url }}">Accueil</a>
      <a href="{{ '/blog.html' | relative_url }}">Articles</a>
      <a href="{{ '/' | relative_url }}#parrainage" class="nav-cta">Parrainage</a>
    </div>
  </nav>
  <main>
    {{ content }}
  </main>
  <footer class="footer">
    <div class="footer-inner">
      <p class="footer-logo">TESLA<span>GUIDE</span></p>
      <p class="footer-sub">Un site indépendant, non affilié à Tesla Inc.</p>
      <nav class="footer-nav">
        <a href="{{ '/' | relative_url }}">Accueil</a>
        <a href="{{ '/blog.html' | relative_url }}">Articles</a>
        <a href="{{ '/' | relative_url }}#parrainage">Parrainage</a>
      </nav>
      <p class="footer-copy">© {{ 'now' | date: "%Y" }} TeslaGuide</p>
    </div>
  </footer>
</body>
</html>
