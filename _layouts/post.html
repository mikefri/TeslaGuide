---
layout: default
---

<article class="article-page">
  <header class="article-header">
    <div class="article-header-inner">
      <div class="article-meta">
        <span class="article-tag">{{ page.category | default: "Tesla" }}</span>
        <span class="article-date">{{ page.date | date: "%d %B %Y" }}</span>
      </div>
      <h1 class="article-title">{{ page.title }}</h1>
      {% if page.excerpt %}
      <p class="article-lead">{{ page.excerpt }}</p>
      {% endif %}
    </div>
  </header>

  <div class="article-body">
    {{ content }}
  </div>

  <div class="article-footer">
    <div class="referral-inline">
      <p>🚗 Vous souhaitez commander une Tesla ?</p>
      <a href="https://ts.la/michael618693" target="_blank" class="btn-primary">
        Utiliser mon lien de parrainage →
      </a>
    </div>
    <a href="/blog.html" class="back-link">← Retour aux articles</a>
  </div>
</article>
