# Informations globales
title: "TeslaGuide — Le guide Tesla en français"
description: "Guides, comparatifs et conseils pour acheter et utiliser une Tesla en France. Modèles, recharge, coûts, parrainage."
url: "https://mikefri.github.io"
baseurl: "/TeslaGuide"
lang: fr
author: "Michael"

# Paramètres SEO et réseaux sociaux (utilisés par jekyll-seo-tag)
